name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: a25d99f65b9f7f88846dd6a4d792f6cb
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Create Pages project (if not exists)
        run: wrangler pages project create ukiptvbox --production-branch main || true

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy dist --project-name ukiptvbox --branch main
